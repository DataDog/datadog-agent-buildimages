---
# Multi-arch manifest for dev-env _test_only images on merge request pipelines.
# Produces registry.ddbuild.io/ci/datadog-agent-buildimages/dev-env-linux_test_only:v<PIPELINE>-<SHA>
# so a single tag can be pulled on amd64 or arm64 (per-arch images remain dev-env-linux-x64_test_only, etc.).
release_dev_env_linux_multiarch_test_only:
  extends: [.x64]
  stage: release
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - if: $ECR_TEST_ONLY == "_test_only"
  id_tokens:
    DDSIGN_ID_TOKEN:
      aud: image-integrity
  needs:
    - job: build_dev_env_linux_x64
    - job: build_dev_env_linux_arm64
  variables:
    TARGET_IMAGE: registry.ddbuild.io/ci/datadog-agent-buildimages/dev-env-linux${ECR_TEST_ONLY}
    AMD64_IMAGE: registry.ddbuild.io/ci/datadog-agent-buildimages/dev-env-linux-x64${ECR_TEST_ONLY}
    ARM64_IMAGE: registry.ddbuild.io/ci/datadog-agent-buildimages/dev-env-linux-aarch64${ECR_TEST_ONLY}
  before_script:
    - !reference [.build, before_script]
  script:
    - >
      docker manifest create $TARGET_IMAGE:$IMAGE_VERSION
      $AMD64_IMAGE:$IMAGE_VERSION
      $ARM64_IMAGE:$IMAGE_VERSION
    - MANIFEST=$(docker manifest inspect $TARGET_IMAGE:$IMAGE_VERSION)
    - DIGEST=sha256:$(echo -n "$MANIFEST" | sha256sum | awk '{print $1}')
    - docker manifest push $TARGET_IMAGE:$IMAGE_VERSION
    - ddsign sign $TARGET_IMAGE:$IMAGE_VERSION@${DIGEST}

release:
  stage: release
  rules:
    - !reference [.on_default_branch_push]
  trigger:
    project: DataDog/public-images
    branch: main
    strategy: depend
  variables:
    IMG_REGISTRIES: dev
    IMG_SIGNING: "false"
  # We cannot use the $IMAGE_VERSION variable directly because there is only one step of variable substitution.
  # See https://forum.gitlab.com/t/inconsistent-variable-behavior-in-multi-project-pipeline/77916.
  # We must use v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA} instead.
  parallel:
    matrix:
      - IMG_SOURCES: registry.ddbuild.io/ci/datadog-agent-buildimages/dev-env-linux-x64:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA},registry.ddbuild.io/ci/datadog-agent-buildimages/dev-env-linux-aarch64:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}
        IMG_DESTINATIONS: agent-dev-env-linux:v$CI_PIPELINE_ID-${CI_COMMIT_SHORT_SHA},agent-dev-env-linux:latest
      - IMG_SOURCES: registry.ddbuild.io/ci/datadog-agent-buildimages/rpm_x64:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}
        IMG_DESTINATIONS: agent-buildimages-rpm_x64:v$CI_PIPELINE_ID-${CI_COMMIT_SHORT_SHA},agent-buildimages-rpm_x64:latest
      - IMG_SOURCES: registry.ddbuild.io/ci/datadog-agent-buildimages/rpm_arm64:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}
        IMG_DESTINATIONS: agent-buildimages-rpm_arm64:v$CI_PIPELINE_ID-${CI_COMMIT_SHORT_SHA},agent-buildimages-rpm_arm64:latest
      - IMG_SOURCES: registry.ddbuild.io/ci/datadog-agent-buildimages/linux:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}-amd64,registry.ddbuild.io/ci/datadog-agent-buildimages/linux:v${CI_PIPELINE_ID}-${CI_COMMIT_SHORT_SHA}-arm64
        IMG_DESTINATIONS: agent-buildimages-linux:v$CI_PIPELINE_ID-${CI_COMMIT_SHORT_SHA},agent-buildimages-linux:latest

release_windows:
  stage: release
  rules:
    - !reference [.on_default_branch_push]
  trigger:
    project: DataDog/public-images
    branch: main
    strategy: depend
  variables:
    IMG_REGISTRIES: dev
    IMG_SIGNING: "false"
    IMG_SOURCES: registry.ddbuild.io/ci/datadog-agent-buildimages/windows_ltsc2022_x64:v$CI_PIPELINE_ID-${CI_COMMIT_SHORT_SHA}
    IMG_DESTINATIONS: agent-buildimages-windows_x64:ltsc2022-v$CI_PIPELINE_ID-${CI_COMMIT_SHORT_SHA},agent-buildimages-windows_x64:ltsc2022

# This job tags the Windows LTSC2022 build image as latest in our internal ddbuild registry.
# This is equivalent to the `ltsc2022` tag we publish on DockerHub, but for internal use (such as for image pre-pulling on AMIs)
release_windows_internal_latest:
  stage: release
  tags: ["arch:arm64"]
  image: $BUILDENV_REGISTRY/images/docker:27.3.1
  rules:
    - !reference [.on_default_branch_push]
  script:
      - IMAGE_NAME=registry.ddbuild.io/ci/datadog-agent-buildimages/windows_ltsc2022_x64${ECR_TEST_ONLY}
      - crane tag ${IMAGE_NAME}:v$CI_PIPELINE_ID-${CI_COMMIT_SHORT_SHA} latest
