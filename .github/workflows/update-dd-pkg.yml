name: Update dd-pkg checksums

on:
  push:
    branches:
      - 'renovate/**'
    paths:
      - 'docker-bake.hcl'

permissions: {}

jobs:
  update-checksums:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}

      - name: Extract version and fetch checksums
        id: version
        run: |
          VERSION=$(grep 'DD_PKG_VERSION' docker-bake.hcl | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          curl -fsSL "https://dd-package-tools.s3.amazonaws.com/dd-pkg/${VERSION}/dd-pkg_SHA256SUMS" -o /tmp/dd-pkg_SHA256SUMS

          SHA_LINUX_X86_64=$(awk '/dd-pkg_Linux_x86_64.tar.gz$/{print $1}' /tmp/dd-pkg_SHA256SUMS)
          SHA_LINUX_ARM64=$(awk '/dd-pkg_Linux_arm64.tar.gz$/{print $1}' /tmp/dd-pkg_SHA256SUMS)

          test -n "${SHA_LINUX_X86_64}"
          test -n "${SHA_LINUX_ARM64}"

          echo "sha_linux_x86_64=${SHA_LINUX_X86_64}" >> "$GITHUB_OUTPUT"
          echo "sha_linux_arm64=${SHA_LINUX_ARM64}" >> "$GITHUB_OUTPUT"

      - name: Update checksums and propagate version
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA_LINUX_X86_64: ${{ steps.version.outputs.sha_linux_x86_64 }}
          SHA_LINUX_ARM64: ${{ steps.version.outputs.sha_linux_arm64 }}
        run: |
          # Update SHAs in docker-bake.hcl (version already updated by Renovate)
          sed -i '/^variable "checksums_amd64"/,/^}/{ /DD_PKG_SHA256/s/[a-f0-9]\{64\}/'"${SHA_LINUX_X86_64}"'/ }' docker-bake.hcl
          sed -i '/^variable "checksums_arm64"/,/^}/{ /DD_PKG_SHA256/s/[a-f0-9]\{64\}/'"${SHA_LINUX_ARM64}"'/ }' docker-bake.hcl

          # Update version + x86_64 SHA in Dockerfiles that are not driven by docker-bake.hcl args.
          sed -i "/^ARG DD_PKG_VERSION/s/=.*/=${VERSION}/" agent-deploy/Dockerfile
          sed -i "/^ARG DD_PKG_SHA256/s/[a-f0-9]\{64\}/${SHA_LINUX_X86_64}/" agent-deploy/Dockerfile

          # rpm-armhf runs on an arm64 build host for dd-pkg.
          sed -i "/^ARG DD_PKG_VERSION/s/=.*/=${VERSION}/" rpm-armhf/Dockerfile
          sed -i "/^ARG DD_PKG_SHA256/s/[a-f0-9]\{64\}/${SHA_LINUX_ARM64}/" rpm-armhf/Dockerfile

      - name: Commit and push
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update dd-pkg checksums and propagate ${{ steps.version.outputs.version }}"
          git push
